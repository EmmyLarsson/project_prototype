<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ประวัติการแจ้งซ่อม — ระบบแจ้งซ่อมหอพัก 10-11 ม.อ.หาดใหญ่</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
  <link rel="stylesheet" href="history.css">
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header class="app-header">
  <!-- Title Row (Gold Area) -->
  <div class="hdr-top">
    <div class="hdr-title-area">
      <h1 class="page-title">ประวัติการแจ้งซ่อม</h1>
      <p class="page-sub">รายการซ่อมครุภัณฑ์ทั้งหมดของคุณ</p>
    </div>
    <div class="hdr-total-badge" id="totalBadge">– รายการ</div>
  </div>

  <!-- White Body: Search + Sort -->
  <div class="hdr-body">
    <!-- Search Bar -->
    <div class="search-wrap">
      <span class="material-symbols-outlined s-icon">search</span>
      <input type="search" id="searchInput"
             placeholder="ค้นหาหมายเลข Case หรือรายการซ่อม…"
             autocomplete="off" aria-label="ค้นหา">
      <button class="btn-clear" id="btnClear" aria-label="ล้างการค้นหา">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <!-- Sort Chips -->
    <div class="sort-bar">
      <span class="sort-bar-label">เรียงตาม</span>
      <div class="sort-chips" role="group" aria-label="เรียงตาม">
        <!-- Date Chip (default active) -->
        <button class="chip chip-active" data-sort="date" aria-pressed="true">
          <span class="material-symbols-outlined chip-icon">calendar_today</span>
          <span>วันที่แจ้ง</span>
          <span class="material-symbols-outlined dir-icon" id="dateDirIcon">arrow_downward</span>
        </button>
        <!-- Type Chip -->
        <button class="chip chip-inactive" data-sort="type" aria-pressed="false">
          <span class="material-symbols-outlined chip-icon">category</span>
          <span>ประเภทงาน</span>
        </button>
        <!-- Status Chip -->
        <button class="chip chip-inactive" data-sort="status" aria-pressed="false">
          <span class="material-symbols-outlined chip-icon">pending_actions</span>
          <span>ความคืบหน้า</span>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- ── Main Content ────────────────────────────────────── -->
<main>
  <div class="sec-row">
    <h2 id="secTitle">รายการทั้งหมด</h2>
    <span class="count-pill" id="countPill">–</span>
  </div>

  <!-- Card Stack: rendered by history.js -->
  <div class="card-stack" id="cardStack"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState">
    <span class="material-symbols-outlined">search_off</span>
    <p class="e-title">ไม่พบรายการที่ค้นหา</p>
    <p class="e-sub">ลองพิมพ์รหัส Case<br>หรือชื่อรายการซ่อมใหม่อีกครั้ง</p>
  </div>
</main>

<!-- FLOATING TAB BAR -->
<nav class="bottom-nav" aria-label="เมนูหลัก">
  <button class="nav-it" data-page="home" aria-label="หน้าหลัก">
    <span class="material-symbols-outlined">home</span>
    <span class="n-lbl">หน้าหลัก</span>
  </button>
  <button class="nav-it active" data-page="history" aria-label="ประวัติการแจ้ง">
    <span class="material-symbols-outlined">history</span>
    <span class="n-lbl">ประวัติแจ้ง</span>
  </button>
  <button class="nav-it" data-page="profile" aria-label="โปรไฟล์">
    <span class="material-symbols-outlined">person</span>
    <span class="n-lbl">โปรไฟล์</span>
  </button>
</nav>

<script src="history.js"></script>
</body>
</html>
